version: '3.8'
services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    ports:
      - "3001:3000" # Maps Umami to Port 3001 on the host to avoid conflicting with Astro (Port 3000)
    environment:
      - DATABASE_URL=postgresql://umami:umami123@db:5432/umami
      - APP_SECRET=ChangeThisToARandomString123456 # Replace this with a random secure string
    depends_on:
      - db
    restart: always
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=umami123 # Replace this with a secure password
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    restart: always

volumes:
  umami-db-data:
