<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GoPlay - Premium Live Sports and IPTV Streaming App.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="goplay">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>GoPlay - Live Sports Streaming</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts Preconnect & Preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #090D16;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #loading-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #111827 0%, #090D16 100%);
      z-index: 99999;
      transition: opacity 0.4s ease-out, visibility 0.4s;
    }
    #loading-splash.fade-out {
      opacity: 0;
      visibility: hidden;
    }
    .loader-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
    }
    .pulse-ring {
      position: absolute;
      width: 90px;
      height: 90px;
      border: 3px solid #10B981;
      border-radius: 50%;
      animation: pulse 1.8s cubic-bezier(0.24, 0, 0.38, 1) infinite;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
    }
    .inner-circle {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, #10B981 0%, #059669 100%);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 30px rgba(16, 185, 129, 0.5);
      animation: bounce 1.8s ease-in-out infinite;
    }
    .inner-circle svg {
      width: 26px;
      height: 26px;
      fill: #090D16;
    }
    .brand-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: #FFFFFF;
      letter-spacing: 5px;
      margin: 8px 0;
      text-transform: uppercase;
      background: linear-gradient(135deg, #FFFFFF 40%, #10B981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 4px 15px rgba(16, 185, 129, 0.25);
    }
    .brand-subtitle {
      font-size: 11px;
      font-weight: 700;
      color: #9CA3AF;
      letter-spacing: 6px;
      text-transform: uppercase;
      opacity: 0.8;
    }
    @keyframes pulse {
      0% {
        transform: scale(0.6);
        opacity: 1;
      }
      100% {
        transform: scale(1.4);
        opacity: 0;
      }
    }
    @keyframes bounce {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(0.92);
      }
    }
  </style>
</head>
<body>
  <!-- Beautiful Premium Loading Splash Screen -->
  <div id="loading-splash">
    <div class="loader-container">
      <div class="pulse-ring"></div>
      <div class="inner-circle">
        <!-- Reusable Play Icon representing Sports Streaming -->
        <svg viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
    </div>
    <div class="brand-title">GoPlay</div>
    <div class="brand-subtitle">Live Sports Streaming</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
