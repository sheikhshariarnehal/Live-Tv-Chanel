    :root {
      --bg: #0b0c10;
      --surface: rgba(22, 26, 35, 0.65);
      --surface-border: rgba(255, 255, 255, 0.08);
      --accent: #ff2a2a;
      --accent-glow: rgba(255, 42, 42, 0.4);
      --text: #f5f6f8;
      --text-muted: rgba(245, 246, 248, 0.6);
      --green: #00e676;
      --blue: #00b0ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    /* Side Panel */
    .sidebar {
      width: 360px;
      background: var(--surface);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--surface-border);
      display: flex;
      flex-direction: column;
      height: 100%;
      z-index: 10;
    }

    .brand {
      padding: 24px;
      border-bottom: 1px solid var(--surface-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand i {
      color: var(--accent);
      font-size: 24px;
      text-shadow: 0 0 10px var(--accent-glow);
    }

    .brand h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .settings-section {
      padding: 20px 24px;
      border-bottom: 1px solid var(--surface-border);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .proxy-selector {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .select-wrap {
      position: relative;
    }

    select, input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--surface-border);
      padding: 10px 14px;
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
    }

    select:focus, input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .channel-list-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .channel-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .category-header {
      padding: 14px 16px 6px 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      margin-top: 8px;
    }
    
    .category-header:first-of-type {
      border-top: none;
      margin-top: 0;
    }
    
    .badge-count {
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 9px;
      font-weight: 600;
      color: var(--text);
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--surface-border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .channel-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateX(4px);
    }

    .channel-item.active {
      background: rgba(255, 42, 42, 0.1);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(255, 42, 42, 0.15);
    }

    .channel-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 16px;
      flex-shrink: 0;
    }

    .channel-info {
      flex: 1;
      min-width: 0;
    }

    .channel-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .channel-type {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Main Content Area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: radial-gradient(circle at top right, rgba(255, 42, 42, 0.03), transparent 60%);
    }

    .player-section {
      flex: 1;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .player-container {
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 16px;
      border: 1px solid var(--surface-border);
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .player-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 12, 16, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 5;
      transition: opacity 0.3s ease;
    }

    .player-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .overlay-text {
      font-size: 16px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Logs & Details Area */
    .dashboard {
      height: 280px;
      background: rgba(15, 18, 25, 0.9);
      border-top: 1px solid var(--surface-border);
      display: flex;
      z-index: 5;
    }

    .details-panel {
      width: 320px;
      border-right: 1px solid var(--surface-border);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-size: 13px;
      font-weight: 500;
      word-break: break-all;
    }

    .badge {

      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;

    .badge-proxy {
      background: rgba(0, 176, 255, 0.15);
      color: var(--blue);
      border: 1px solid rgba(0, 176, 255, 0.3);
    }

    .badge-direct {
      background: rgba(0, 230, 118, 0.15);
      color: var(--green);
      border: 1px solid rgba(0, 230, 118, 0.3);
    }

    .console-panel {
      flex: 1;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .console-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .console-logs {
      flex: 1;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid var(--surface-border);
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      padding: 12px 16px;
      overflow-y: auto;
      color: #9cdcfe;
    }

    .log-entry {
      margin-bottom: 6px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .log-info { color: #9cdcfe; }
    .log-success { color: var(--green); }
    .log-error { color: var(--accent); }
    .log-warn { color: #ffeb3b; }

    .btn-clear {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      transition: color 0.2s;
    }

    .btn-clear:hover {
      color: var(--text);
    }

    .load-btn {
      background: var(--accent);
      border: none;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .load-btn:hover {
      box-shadow: 0 0 15px var(--accent-glow);
      transform: translateY(-1px);
    }

    /* Scrollbar */

      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }
  </style>
</head>

    <div class="settings-section">

      </div>
    </div>

    <!-- Channel List -->

  </div>

  <!-- Main Content Area -->
  <div class="main-content">
    
    <!-- Player -->
    <div class="player-section">

        <div class="player-overlay" id="playerOverlay">
          <div class="spinner" id="playerSpinner"></div>
          <div class="overlay-text" id="overlayText">Select a channel to play</div>
        </div>
      </div>
    </div>

    <!-- Dashboard/Details -->
    <div class="dashboard">
      <div class="details-panel">
        <div class="detail-item">
          <span class="detail-label">Active Stream</span>
          <span class="detail-value" id="activeName">-</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Proxy Mode</span>
          <span id="activeProxyMode" class="badge badge-direct">Direct</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">Resolved Stream URL</span>
          <span class="detail-value" id="activeUrl" style="font-size: 11px; opacity: 0.8;">-</span>
        </div>
      </div>

      <div class="console-panel">
        <div class="console-header">
          <span class="section-title">Console Output Logs</span>
          <button class="btn-clear" id="clearConsole">Clear Logs</button>
        </div>
        <div class="console-logs" id="consoleLogs">
          <!-- Log lines rendered here -->
        </div>
      </div>
    </div>
  </div>

    const PROXIES = {
      hls: 'https://live-stream-proxy.sheikhshariarnehal.workers.dev/?url=',
      fifa: 'https://live-stream-proxy.sheikhshariarnehal.workers.dev/?url=',
      direct: ''
    };

    // DOM Elements
    const video = document.getElementById('videoPlayer');
    const proxySelect = document.getElementById('proxySelect');
    const customProxyWrap = document.getElementById('customProxyWrap');
    const customProxyInput = document.getElementById('customProxyInput');
    const customUrl = document.getElementById('customUrl');
    const loadCustom = document.getElementById('loadCustom');
    const channelList = document.getElementById('channelList');
    const playerOverlay = document.getElementById('playerOverlay');
    const playerSpinner = document.getElementById('playerSpinner');
    const overlayText = document.getElementById('overlayText');
    const activeName = document.getElementById('activeName');
    const activeProxyMode = document.getElementById('activeProxyMode');
    const activeUrl = document.getElementById('activeUrl');
    const consoleLogs = document.getElementById('consoleLogs');
    const clearConsole = document.getElementById('clearConsole');

    let shakaPlayerInstance = null;
    let hlsInstance = null;
    let mpegtsPlayerInstance = null;
    let selectedChannel = null;

    // Logging helpers
    function log(msg, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      const time = new Date().toLocaleTimeString();
      entry.textContent = `[${time}] ${msg}`;
      consoleLogs.appendChild(entry);
      consoleLogs.scrollTop = consoleLogs.scrollHeight;
      console.log(`[${type.toUpperCase()}] ${msg}`);
    }

    clearConsole.addEventListener('click', () => {
      consoleLogs.innerHTML = '';
      log("Logs cleared", "info");
    });

    // Handle Proxy Selector changes
    proxySelect.addEventListener('change', () => {
      if (proxySelect.value === 'custom') {
        customProxyWrap.style.display = 'block';
      } else {
        customProxyWrap.style.display = 'none';
      }
      log(`Proxy mode switched to: ${proxySelect.value.toUpperCase()}`);
      if (selectedChannel) {
        loadStream(selectedChannel);
      }
    });

    customProxyInput.addEventListener('input', () => {
      if (selectedChannel) {
        loadStream(selectedChannel);
      }
    });

    // Search filter event listener
    const searchBox = document.getElementById('searchBox');
    searchBox.addEventListener('input', () => {
      const q = searchBox.value.toLowerCase().trim();
      const items = channelList.querySelectorAll('.channel-item');
      
      items.forEach(item => {
        const name = item.querySelector('.channel-name').textContent.toLowerCase();
        if (name.includes(q)) {
          item.style.display = 'flex';
        } else {
          item.style.display = 'none';
        }
      });
      
      // Toggle category headers based on visibility of items under it
      let currentHeader = null;
      let hasVisibleItem = false;
      const children = Array.from(channelList.children);
      children.forEach(child => {
        if (child.classList.contains('category-header')) {
          if (currentHeader && !hasVisibleItem) {
            currentHeader.style.display = 'none';
          }
          currentHeader = child;
          child.style.display = 'flex';
          hasVisibleItem = false;
        } else if (child.classList.contains('channel-item')) {
          if (child.style.display === 'flex') {
            hasVisibleItem = true;
          }
        }
      });
      if (currentHeader && !hasVisibleItem) {
        currentHeader.style.display = 'none';
      }
    });

    // Populate Channel List
    function init() {
      // Try loading channels.json database first
      fetch('channels.json')
        .then(res => res.json())
        .then(data => {
          if (data.categories) {
            log("Dynamically loaded database from channels.json", "success");
            renderCategorizedChannels(data.categories);
          } else {
            log("Loaded channels.json but format is flat. Rendering flat...", "info");
            renderChannels(data.channels || data);
          }
        })
        .catch(() => {
          log("Could not load channels.json directly. Trying scrabe_1.json...", "info");
          fetch('scrabe_1.json')
            .then(res => res.json())
            .then(data => {
              log("Dynamically loaded channels from scrabe_1.json", "success");
              renderChannels(data.channels || data);
            })
            .catch(() => {
              log("No external database accessible. Using fallback channel list.", "warn");
              if (CHANNELS.categories) { renderCategorizedChannels(CHANNELS.categories); } else { renderChannels(CHANNELS); }
            });
        });

      // Install Shaka polyfills
      shaka.polyfill.installAll();
      if (!shaka.Player.isBrowserSupported()) {
        log("DASH/DRM Playback is NOT supported in this browser!", "error");
      }
    }

    function renderCategorizedChannels(categories) {
      channelList.innerHTML = '';
      let total = 0;
      
      for (const catKey in categories) {
        const cat = categories[catKey];
        if (!cat.channels || cat.channels.length === 0) continue;
        
        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = `<span>${cat.name}</span> <span class="badge-count">${cat.channels.length}</span>`;
        channelList.appendChild(header);
        
        cat.channels.forEach(ch => {
          total++;
          const item = document.createElement('div');
          item.className = 'channel-item';
          item.dataset.id = ch.id;
          
          const isFifa = ch.name.toLowerCase().includes('fifa') || cat.name.toLowerCase().includes('fifa');
          const iconClass = isFifa ? 'fa-solid fa-trophy' : (catKey.includes('movie') ? 'fa-solid fa-film' : 'fa-solid fa-tv');
          const streamType = ch.url.includes('.mpd') ? 'DASH (DRM)' : 'HLS';
          
          item.innerHTML = `
            <div class="channel-icon">
              <i class="${iconClass}"></i>
            </div>
            <div class="channel-info">
              <div class="channel-name">${ch.name}</div>
              <div class="channel-type">${streamType}</div>
            </div>
          `;
          
          item.addEventListener('click', () => {
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            
            // Auto toggle proxy based on database config for this channel
            proxySelect.value = ch.proxy ? 'fifa' : 'direct';
            customProxyWrap.style.display = 'none';
            
            selectedChannel = ch;
            loadStream(ch);
          });
          
          channelList.appendChild(item);
        });
      }
      log(`Rendered ${total} categorized channels in sidebar`, "success");
    }

    function renderChannels(list) {
      channelList.innerHTML = '';
      list.forEach(ch => {
        const item = document.createElement('div');
        item.className = 'channel-item';
        item.dataset.id = ch.id;

        const isFifa = ch.name.toLowerCase().includes('fifa');
        const iconClass = isFifa ? 'fa-solid fa-trophy' : 'fa-solid fa-tv';
        const streamType = ch.url.includes('.mpd') ? 'DASH (DRM)' : 'HLS';

        item.innerHTML = `
          <div class="channel-icon">
            <i class="${iconClass}"></i>
          </div>
          <div class="channel-info">
            <div class="channel-name">${ch.name}</div>
            <div class="channel-type">${streamType}</div>
          </div>
        `;

        item.addEventListener('click', () => {
          document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
          item.classList.add('active');
          
          proxySelect.value = ch.proxy ? 'fifa' : 'direct';
          customProxyWrap.style.display = 'none';
          
          selectedChannel = ch;
          loadStream(ch);
        });

        channelList.appendChild(item);
      });
      log(`Rendered ${list.length} channels in sidebar`, "success");
    }

    // Load Stream Helper
    async function loadStream(ch) {
      // Reset players
      destroyPlayers();
      showOverlay("Loading stream...", true);

      activeName.textContent = ch.name;
      
      // Determine Proxy URL
      let proxyPrefix = '';
      const mode = proxySelect.value;
      if (mode === 'custom') {
        proxyPrefix = customProxyInput.value;
      } else {
        proxyPrefix = PROXIES[mode];
      }

      const resolvedUrl = proxyPrefix ? proxyPrefix + encodeURIComponent(ch.url) : ch.url;
      activeUrl.textContent = resolvedUrl;
      
      activeProxyMode.textContent = proxyPrefix ? 'PROXIED' : 'DIRECT';
      activeProxyMode.className = `badge ${proxyPrefix ? 'badge-proxy' : 'badge-direct'}`;

      log(`Preparing to load: ${ch.name}`);
      log(`Stream URL: ${ch.url}`);
      if (proxyPrefix) log(`Proxied URL: ${resolvedUrl}`);

      const isMpd = ch.url.includes('.mpd');
      const isTs = ch.url.includes('.ts') || ch.url.includes('/ts/') || ch.url.includes('/ts');
      if (isMpd) {
        await playMpd(resolvedUrl, ch.drm);
      } else if (isTs) {
        playMpegTs(resolvedUrl);
      } else {
        playHls(resolvedUrl);
      }
    }

    // HLS.js playback
    function playHls(url) {
      log("Initializing HLS.js player...", "info");
      
      if (Hls.isSupported()) {
        hlsInstance = new Hls({
          enableWorker: true,
          lowLatencyMode: true
        });

        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);

        hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
          log("HLS manifest parsed successfully! Starting playback...", "success");
          hideOverlay();
          video.play().catch(err => {
            log(`Autoplay blocked: ${err.message}. Click play manually.`, "warn");
          });
        });

        hlsInstance.on(Hls.Events.ERROR, (event, data) => {
          if (data.fatal) {
            log(`Fatal HLS error encountered: ${data.type} - ${data.details}`, "error");
            showOverlay(`Playback failed: ${data.details}`, false);
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                log("Network error. Attempting recovery...", "warn");
                hlsInstance.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                log("Media error. Attempting recovery...", "warn");
                hlsInstance.recoverMediaError();
                break;
              default:
                destroyPlayers();
                break;
            }
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        log("Browser supports native HLS playback (Safari).", "info");
        video.src = url;
        video.addEventListener('loadedmetadata', () => {
          hideOverlay();
          video.play();
        });
        video.addEventListener('error', () => {
          log("Native HLS playback failed", "error");
          showOverlay("Native playback error", false);
        });
      } else {
        log("HLS is not supported in this browser.", "error");
        showOverlay("HLS unsupported on this browser", false);
      }
    }

    // Shaka DASH DRM playback
    async function playMpd(url, drm) {
      log("Initializing Shaka Player for DASH/DRM stream...", "info");
      
      try {
        shakaPlayerInstance = new shaka.Player(video);
        
        // Listen to error events
        shakaPlayerInstance.addEventListener('error', (event) => {
          log(`Shaka Player Error: ${event.detail.code} - ${event.detail.message}`, "error");
          showOverlay(`DASH Error: code ${event.detail.code}`, false);
        });

        // Configure DRM ClearKey if present
        if (drm && drm.kid && drm.key) {
          log(`Configuring ClearKey DRM for DASH stream...`, "info");
          log(`KeyID: ${drm.kid} | Key: ${drm.key}`, "info");
          shakaPlayerInstance.configure({
            drm: {
              clearKeys: {
                [drm.kid]: drm.key
              }
            }
          });
        }

        // Load stream
        await shakaPlayerInstance.load(url);
        log("DASH manifest loaded successfully! Starting playback...", "success");
        hideOverlay();
        video.play().catch(err => {
          log(`Autoplay blocked: ${err.message}`, "warn");
        });
      } catch (error) {
        log(`Shaka loading failed: ${error.message}`, "error");
        showOverlay("DASH playback failed", false);
        destroyPlayers();
      }
    }

    function playMpegTs(url) {
      log("Initializing mpegts.js player for raw MPEG-TS stream...", "info");
      
      try {
        if (mpegts.getFeatureList().mseLivePlayback) {
          mpegtsPlayerInstance = mpegts.createPlayer({
            type: 'mpegts',
            isLive: true,
            url: url
          }, {
            enableWorker: true,
            enableStashBuffer: false
          });
          
          mpegtsPlayerInstance.attachMediaElement(video);
          mpegtsPlayerInstance.load();
          
          mpegtsPlayerInstance.on(mpegts.Events.ERROR, (type, detail, info) => {
            log(`MPEG-TS Player Error: ${type} - ${detail}`, "error");
            showOverlay(`TS Error: ${detail}`, false);
          });
          
          hideOverlay();
          mpegtsPlayerInstance.play().catch(err => {
            log(`Autoplay blocked: ${err.message}`, "warn");
          });
          log("MPEG-TS player started successfully!", "success");
        } else {
          log("MSE live playback not supported on this browser.", "error");
          showOverlay("MSE playback unsupported", false);
        }
      } catch (error) {
        log(`MPEG-TS loading failed: ${error.message}`, "error");
        showOverlay("TS playback failed", false);
        destroyPlayers();
      }
    }

    function destroyPlayers() {
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
        log("HLS instance destroyed", "info");
      }
      if (shakaPlayerInstance) {
        shakaPlayerInstance.destroy();
        shakaPlayerInstance = null;
        log("Shaka player instance destroyed", "info");
      }
      if (mpegtsPlayerInstance) {
        mpegtsPlayerInstance.destroy();
        mpegtsPlayerInstance = null;
        log("MPEG-TS instance destroyed", "info");
      }
      video.removeAttribute('src');
      video.load();
    }

    function showOverlay(text, spin = true) {
      playerOverlay.classList.remove('hidden');
      overlayText.textContent = text;
      playerSpinner.style.display = spin ? 'block' : 'none';
    }

    function hideOverlay() {
      playerOverlay.classList.add('hidden');
    }

    // Load Custom URL manually
    loadCustom.addEventListener('click', () => {
      const url = customUrl.value.trim();
      if (!url) {
        log("Please enter a valid URL", "error");
        return;
      }
      selectedChannel = {
        name: "Custom Test Link",
        url: url
      };
      
      // Auto toggle proxy based on type
      if (url.toLowerCase().includes('fifa')) {
        proxySelect.value = 'fifa';
      } else {
        proxySelect.value = 'hls';
      }
      customProxyWrap.style.display = 'none';

      document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
      loadStream(selectedChannel);
    });

    // Start
    init();
  </script>
