version: "2"
type: frontend
tech_stack:
  - JavaScript
  - TypeScript
  - Astro
  - CSS
routes:
  - path: /
    file: src/pages/index.astro
    auth_required: false
    description: Live stream video player and channel selector homepage
  - path: /watch
    file: src/pages/watch/index.astro
    auth_required: false
    description: Channel directory explore page with search and category filtering
  - path: /watch/:id
    file: src/pages/watch/[id].astro
    auth_required: false
    description: Streaming playback page for a specific TV channel by slug or ID
  - path: /api/channels
    file: src/pages/api/channels.js
    auth_required: false
    description: JSON API endpoint to fetch list of categories and TV channels
  - path: /api/news
    file: src/pages/api/news.js
    auth_required: false
    description: JSON API endpoint to fetch latest sports headlines from RSS feeds
features:
  - name: Channel Explorer Directory
    description: Real-time channel search and filter by category
    files:
      - src/pages/watch/index.astro
    entry_route: /watch
    user_interactions:
      - Type query in the search input field to filter channels
      - View channel count for each category
      - Click channel card to go to play the stream
    api_calls: []
    auth_required: false
  - name: Streaming Video Player
    description: Watch live TV channel streams with category tabs
    files:
      - src/layouts/MainLayout.astro
      - src/pages/index.astro
      - src/pages/watch/[id].astro
    entry_route: /
    user_interactions:
      - Click tab buttons to switch between categories in the sidebar
      - Click channel buttons to load and switch streams
      - View error overlay and click Retry button if a stream fails to load
    api_calls:
      - method: GET
        endpoint: /api/channels
      - method: GET
        endpoint: /api/news
    auth_required: false
known_limitations:
  - issue: Video playback stream might fail if local proxy is not running or streams are offline
    location: src/layouts/MainLayout.astro
    impact: Displays error card overlay with Stream Load Failed message
